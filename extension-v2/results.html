<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claw Results</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
    h1 { font-size: 18px; color: #58a6ff; margin-bottom: 4px; }
    .meta { color: #8b949e; font-size: 13px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 8px 12px; background: #161b22; color: #58a6ff; border-bottom: 1px solid #30363d; font-weight: 600; }
    td { padding: 8px 12px; border-bottom: 1px solid #21262d; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: #161b22; }
    .empty { color: #484f58; text-align: center; padding: 40px; }
    .error { color: #f85149; padding: 20px; }
  </style>
</head>
<body>
  <h1 id="title">claw://</h1>
  <div class="meta" id="meta"></div>
  <div id="content"></div>
  <script src="results.js"></script>
</body>
</html>
