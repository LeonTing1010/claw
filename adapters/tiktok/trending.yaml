site: tiktok
name: trending
description: TikTok Trending Videos
domain: tiktok.com
strategy: cookie
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [rank, author, views, url]

pipeline:
  - navigate: https://www.tiktok.com/explore
  - wait: 5
  - evaluate: |
      (() => {
        const links = document.querySelectorAll('a[href*="/video/"]');
        const items = [];
        const seen = new Set();
        for (const a of links) {
          const href = a.href;
          if (seen.has(href)) continue;
          seen.add(href);
          const match = href.match(/@([^/]+)/);
          const author = match ? match[1] : '';
          const views = a.textContent.trim();
          items.push({
            rank: items.length + 1,
            author: author,
            views: views || '0',
            url: href
          });
        }
        return items;
      })()
  - map:
      rank: ${{ item.rank }}
      author: ${{ item.author }}
      views: ${{ item.views }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}
