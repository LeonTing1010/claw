site: stackoverflow
name: hot
description: StackOverflow 热门问题
domain: stackoverflow.com
strategy: public
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [rank, title, score, answers, tags]

pipeline:
  - navigate: https://stackoverflow.com
  - evaluate: |
      (async () => {
        const res = await fetch('https://api.stackexchange.com/2.3/questions?order=desc&sort=hot&site=stackoverflow&pagesize=50');
        const data = await res.json();
        return data.items.map((q, i) => ({
          rank: i + 1,
          title: q.title,
          score: q.score,
          answers: q.answer_count,
          tags: q.tags.join(', ')
        }));
      })()
  - map:
      rank: ${{ item.rank }}
      title: ${{ item.title }}
      score: ${{ item.score }}
      answers: ${{ item.answers }}
      tags: ${{ item.tags }}
  - limit: ${{ args.limit }}
