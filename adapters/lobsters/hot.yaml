site: lobsters
name: hot
description: Lobsters 热门帖子
domain: lobste.rs
strategy: public
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [rank, title, score, tags, comments]

pipeline:
  - navigate: https://lobste.rs
  - evaluate: |
      (async () => {
        const res = await fetch('https://lobste.rs/hottest.json');
        const data = await res.json();
        return data.map((t, i) => ({
          rank: i + 1,
          title: t.title,
          score: t.score,
          tags: t.tags.join(', '),
          comments: t.comment_count
        }));
      })()
  - map:
      rank: ${{ item.rank }}
      title: ${{ item.title }}
      score: ${{ item.score }}
      tags: ${{ item.tags }}
      comments: ${{ item.comments }}
  - limit: ${{ args.limit }}
