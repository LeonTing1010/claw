site: instagram
name: explore
description: Instagram Explore
domain: instagram.com
strategy: cookie
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [rank, caption, author, likes]

pipeline:
  - navigate: https://www.instagram.com/explore/
  - wait: 5
  - evaluate: |
      (() => {
        const items = [];
        const posts = document.querySelectorAll('a[href*="/p/"], a[href*="/reel/"]');
        const seen = new Set();
        for (const a of posts) {
          const href = a.href;
          if (seen.has(href)) continue;
          seen.add(href);
          const img = a.querySelector('img');
          const caption = img ? (img.alt || '').trim() : '';
          const likeEl = a.querySelector('[class*="like"], span');
          const likes = likeEl ? likeEl.textContent.trim() : '0';
          items.push({
            rank: items.length + 1,
            caption: caption.substring(0, 200),
            author: '',
            likes: likes
          });
        }
        return items;
      })()
  - map:
      rank: ${{ item.rank }}
      caption: ${{ item.caption }}
      author: ${{ item.author }}
      likes: ${{ item.likes }}
  - limit: ${{ args.limit }}
