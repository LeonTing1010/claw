site: zhihu
name: search
description: 搜索知乎内容，返回标题+点赞数+作者
domain: zhihu.com
strategy: cookie
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  keyword:
    type: string
  limit:
    type: int
    default: 20

columns: [title, likes, author, url]

pipeline:
  - navigate: https://www.zhihu.com
  - wait: 3
  - evaluate: |
      (async () => {
        try {
          const keyword = decodeURIComponent("${{ args.keyword }}");
          const params = new URLSearchParams({
            t: 'general',
            q: keyword,
            correction: '1',
            offset: '0',
            limit: '20'
          });
          const res = await fetch(
            'https://www.zhihu.com/api/v4/search_v3?' + params.toString(),
            { credentials: 'include' }
          );
          const data = await res.json();
          return (data.data || [])
            .filter(item => item.object)
            .map(item => {
              const obj = item.object;
              // Strip HTML tags
              const title = (obj.title || obj.question?.title || '')
                .replace(/<[^>]+>/g, '').trim();
              const voteup = obj.voteup_count || obj.answer_count || 0;
              const author = obj.author?.name || '';
              const url = obj.url
                ? obj.url.replace('api.zhihu.com/questions', 'zhihu.com/question')
                    .replace('api.zhihu.com/answers', 'zhihu.com/answer')
                : '';
              return { title, likes: String(voteup), author, url };
            })
            .filter(item => item.title.length > 0);
        } catch(e) {
          return [{ title: 'Error: ' + e.message, likes: '0', author: '', url: '' }];
        }
      })()
  - map:
      title: ${{ item.title }}
      likes: ${{ item.likes }}
      author: ${{ item.author }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}
