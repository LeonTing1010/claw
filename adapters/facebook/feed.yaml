site: facebook
name: feed
description: Facebook News Feed
domain: facebook.com
strategy: cookie
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [rank, author, text, url]

pipeline:
  - navigate: https://www.facebook.com/
  - wait: 5
  - evaluate: |
      (() => {
        const items = [];
        const articles = document.querySelectorAll('[role="article"]');
        articles.forEach((el, i) => {
          const authorEl = el.querySelector('h3 a, h4 a, [data-ad-preview="headline"] a, strong a');
          const author = authorEl ? authorEl.textContent.trim() : '';
          const textEls = el.querySelectorAll('[dir="auto"]');
          let text = '';
          for (const t of textEls) {
            const content = t.textContent.trim();
            if (content.length > text.length && content.length < 500) text = content;
          }
          const linkEl = el.querySelector('a[href*="/posts/"], a[href*="/photos/"], a[href*="/videos/"], a[href*="permalink"]');
          const url = linkEl ? linkEl.href : '';
          if (author || text) {
            items.push({ rank: i + 1, author, text: text.substring(0, 200), url });
          }
        });
        return items;
      })()
  - map:
      rank: ${{ item.rank }}
      author: ${{ item.author }}
      text: ${{ item.text }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}
