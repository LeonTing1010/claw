site: bluesky
name: trending
description: Bluesky 热门话题
domain: bsky.app
strategy: public
browser: false
version: "2"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [topic]

pipeline:
  - fetch: https://public.api.bsky.app/xrpc/app.bsky.unspecced.getTrendingTopics
  - select: topics
  - map:
      topic: ${{ item.topic }}
  - limit: ${{ args.limit }}
