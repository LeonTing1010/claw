site: proxy
name: collect
description: 聚合 GitHub 公开代理节点，去重后输出
domain: github.com
strategy: public
browser: true

args:
  limit:
    type: int
    default: 50

columns: [protocol, name, server, uri]

pipeline:
  - navigate: https://github.com
  - wait: 2
  - evaluate: |
      (async () => {
        const sources = [
          'https://raw.githubusercontent.com/peasoft/NoMoreWalls/master/list.txt',
          'https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt',
          'https://raw.githubusercontent.com/barry-far/V2ray-Configs/main/Sub1.txt',
          'https://raw.githubusercontent.com/mfuu/v2ray/master/v2ray',
          'https://raw.githubusercontent.com/ermaozi/get_subscribe/main/subscribe/v2ray.txt',
        ];

        const protocols = /^(hysteria2|hy2|hysteria|vmess|vless|trojan|ss|tuic|wg|wireguard):\/\//;
        const results = [];
        const seen = new Set();

        for (const url of sources) {
          try {
            const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
            if (!res.ok) continue;
            const text = await res.text();

            let lines;
            try {
              lines = atob(text.trim()).split('\n');
            } catch {
              lines = text.split('\n');
            }

            for (let line of lines) {
              line = line.trim();
              if (!line || !protocols.test(line)) continue;
              if (seen.has(line)) continue;
              seen.add(line);

              const proto = line.split('://')[0]
                .replace('hy2', 'hysteria2');

              const hashIdx = line.lastIndexOf('#');
              const name = hashIdx > 0
                ? decodeURIComponent(line.substring(hashIdx + 1)).substring(0, 40)
                : '';

              let server = '';
              try {
                if (proto === 'vmess') {
                  const j = JSON.parse(atob(line.substring(8)));
                  server = j.add + ':' + j.port;
                } else {
                  const m = line.match(/@([^?#\/]+)/);
                  server = m ? m[1] : '';
                }
              } catch {}

              // Skip loopback / private / invalid servers
              if (/^(127\.|10\.|192\.168\.|0\.0\.|localhost|\[::)/.test(server)) continue;
              if (!server || server.length < 5) continue;

              results.push({ protocol: proto, name, server, uri: line });
            }
          } catch {}
        }

        return results;
      })()
  - map:
      protocol: ${{ item.protocol }}
      name: ${{ item.name }}
      server: ${{ item.server }}
      uri: ${{ item.uri }}
  - limit: ${{ args.limit }}
