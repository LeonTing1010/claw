# Template: Read from Public API (Tier 1)
#
# Use when: data is available via public HTTP endpoint, no auth needed.
# Fastest path — no browser, no cookies, pure HTTP.
#
# How to forge:
#   1. navigate to the site
#   2. network-log start → interact → network-log dump
#   3. Find the API endpoint that returns the data
#   4. Replace the URL and field mappings below

site: SITE_NAME
name: COMMAND_NAME
description: DESCRIPTION
version: "1"
last_forged: "YYYY-MM-DD"
forged_by: "AGENT_NAME"

args:
  limit:
    type: int
    default: 10

columns: [title, url]

pipeline:
  - fetch: https://api.example.com/data?limit=${{ args.limit }}
  - select: data.items
  - map:
      title: ${{ item.title }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}
