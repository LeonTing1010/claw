# Template: Read from Public API (Tier 1)
#
# Use when: data is available via public HTTP endpoint, no auth needed.
# Fastest path — no browser, no cookies, pure HTTP.
#
# How to forge:
#   1. RECON: network_log_start → navigate → interact → network_log_dump_bodies
#   2. Find the API endpoint in the network log
#   3. Replace URL and field mappings below

site: SITE_NAME
name: COMMAND_NAME
description: DESCRIPTION
version: "1"
last_forged: "YYYY-MM-DD"
forged_by: "AGENT_NAME"

args:
  limit:
    type: int
    default: 10

columns: [title, url]

pipeline:
  - fetch: https://api.example.com/data?limit=${{ args.limit }}
  - select: data.items
  - map:
      title: ${{ item.title }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}
