# Template: UI Write Operation (Tier 5)
#
# Use when: must interact with the UI — publish, submit, upload.
# YAML metadata + intent for WHAT, Lua run: for HOW.
#
# How to forge:
#   1. RECON: network_log_start → navigate → explore → trigger → network_log_dump_bodies
#   2. If no API found, use this template
#   3. Fill in the run: script with page:* calls
#   4. Define intent success conditions
#   5. verify_adapter to check both pipeline and intent

site: SITE_NAME
name: COMMAND_NAME
description: DESCRIPTION
domain: example.com
strategy: cookie
browser: true
version: "1"
last_forged: "YYYY-MM-DD"
forged_by: "AGENT_NAME"

args:
  title:
    type: string
    default: ""
  content:
    type: string
    default: ""
  images:
    type: string
    default: ""

columns: [status, detail]

run: |
  page:goto("https://example.com/publish")
  page:wait_for_selector(".editor", 10)

  -- Handle potential modal
  if page:find(".modal-overlay") then
    page:click_selector(".modal-close")
    page:wait(1)
  end

  -- Upload images (if provided)
  if args.images and args.images ~= "" then
    page:upload("input[type='file']", args.images)
    page:wait(15)
  end

  -- Fill form fields
  page:type_into(".title-input", args.title)
  page:wait(0.5)
  page:type_into(".content-editor", args.content)
  page:wait(0.5)

  -- Submit
  page:click_text("发布")
  page:wait_for_url("/success", 10)

  return {
    status = "published",
    detail = page:page_info().url
  }
