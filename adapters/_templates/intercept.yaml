# Template: Network Intercept (Tier 3-4)
#
# Use when: API uses signed requests, CSRF tokens, or other protections
# that prevent direct replay. Let the browser sign, capture the response.
#
# How to forge:
#   1. RECON: network_log_start → navigate → trigger → network_log_dump_bodies
#   2. Identify the API call with signatures/tokens
#   3. Set trigger (what causes the request) and capture (URL pattern)

site: SITE_NAME
name: COMMAND_NAME
description: DESCRIPTION
domain: example.com
strategy: intercept
browser: true
version: "1"
last_forged: "YYYY-MM-DD"
forged_by: "AGENT_NAME"

args:
  limit:
    type: int
    default: 10

columns: [title, url]

pipeline:
  - intercept:
      trigger: "navigate: https://example.com/feed"
      capture: "/api/v1/feed"
      timeout: 10
      select: data.items
  - map:
      title: ${{ item.title }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}
