site: pixiv
name: ranking
description: Pixiv 每日插画排行榜
domain: pixiv.net
strategy: public
browser: false
version: "2"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [rank, title, author, views]

pipeline:
  - fetch: https://www.pixiv.net/ranking.php?mode=daily&content=all&p=1&format=json
  - select: contents
  - map:
      rank: ${{ item.rank }}
      title: ${{ item.title }}
      author: ${{ item.user_name }}
      views: ${{ item.view_count }}
  - limit: ${{ args.limit }}
