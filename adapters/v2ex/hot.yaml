site: v2ex
name: hot
description: V2EX 热门话题
domain: v2ex.com
strategy: public
browser: false
version: "2"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [title, node, replies]

pipeline:
  - fetch: https://www.v2ex.com/api/topics/hot.json
  - map:
      title: ${{ item.title }}
      node: ${{ item.node.title }}
      replies: ${{ item.replies }}
  - limit: ${{ args.limit }}
