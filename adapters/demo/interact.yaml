site: demo
name: interact
description: Demo CDP native type + click interactions
browser: true

args:
  query:
    type: string
    default: "claw CDP test"

columns: [action, result]

pipeline:
  - navigate: https://www.google.com
  - wait: 3
  - type:
      selector: "textarea[name=q]"
      text: "${{ args.query }}"
  - wait: 0.5
  - evaluate: |
      (() => {
        const val = document.querySelector('textarea[name=q]').value;
        return [
          { action: 'type_into', result: val },
          { action: 'page_title', result: document.title }
        ];
      })()
  - map:
      action: ${{ item.action }}
      result: ${{ item.result }}
