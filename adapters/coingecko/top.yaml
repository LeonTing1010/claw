site: coingecko
name: top
description: 加密货币市值排行
domain: coingecko.com
strategy: public
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [name, symbol, price, change_24h]

pipeline:
  - navigate: https://www.coingecko.com
  - evaluate: |
      (async () => {
        const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50');
        const data = await res.json();
        return data.map(c => ({
          name: c.name,
          symbol: c.symbol.toUpperCase(),
          price: '$' + (c.current_price || 0).toLocaleString(),
          change_24h: (c.price_change_percentage_24h >= 0 ? '+' : '') + (c.price_change_percentage_24h || 0).toFixed(2) + '%'
        }));
      })()
  - map:
      name: ${{ item.name }}
      symbol: ${{ item.symbol }}
      price: ${{ item.price }}
      change_24h: ${{ item.change_24h }}
  - limit: ${{ args.limit }}
