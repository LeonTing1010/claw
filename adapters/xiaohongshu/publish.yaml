site: xiaohongshu
name: publish
description: 小红书发布图文笔记
domain: creator.xiaohongshu.com
strategy: cookie
browser: true
version: "3"
last_forged: "2026-03-27"
forged_by: "claude-opus-4"

args:
  title:
    type: string
    default: ""
  content:
    type: string
    default: ""
  images:
    type: string

columns: [status, detail]

run: |
  page:goto("https://creator.xiaohongshu.com/publish/publish")
  page:wait_for_selector(".creator-tab", 10)

  page:click_text("上传图文")
  page:wait(2)

  -- 上传图片 (required by args layer)
  page:upload("input.upload-input", args.images)
  page:wait(20)

  -- 填写标题 (optional)
  if args.title ~= "" then
    page:type_into("input.d-text", args.title)
    page:wait(0.5)
  end

  -- 填写正文 (optional)
  if args.content ~= "" then
    page:type_into(".tiptap.ProseMirror", args.content)
    page:wait(0.5)
  end

  -- 发布 — run: 只执行动作，不判断成败
  page:click_text("发布")
  page:wait(5)

  -- 返回事实，不做判断 — intent.success 会验证
  return {
    status = "submitted",
    detail = page:page_info().url or ""
  }
