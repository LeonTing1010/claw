site: xiaohongshu
name: publish
description: 小红书发布图文笔记
domain: creator.xiaohongshu.com
strategy: cookie
browser: true
version: "2"
last_forged: "2026-03-27"
forged_by: "claude-opus-4"

args:
  title:
    type: string
    default: ""
  content:
    type: string
    default: ""
  images:
    type: string
    default: ""

columns: [status, detail]

pipeline:
  # 1. 打开发布页
  - navigate: https://creator.xiaohongshu.com/publish/publish
  - wait_for:
      selector: ".creator-tab"
      timeout: 10

  # 2. 切换到"上传图文" tab（CDP native click）
  - click: "上传图文"
  - wait: 2

  # 3. 上传图片（CDP native DOM.setFileInputFiles）
  - upload:
      selector: "input.upload-input"
      files: "${{ args.images }}"
  - wait_for_network_idle: 20

  # 4. 填写标题（CDP native keyboard）
  - type:
      selector: "input.d-text"
      text: "${{ args.title }}"
  - wait: 0.5

  # 5. 填写正文（CDP native keyboard into ProseMirror editor）
  - type:
      selector: ".tiptap.ProseMirror"
      text: "${{ args.content }}"
  - wait: 0.5

  # 6. 点击发布按钮（CDP native click）
  - click: "发布"
  - wait: 5

  # 7. 检查结果
  - evaluate: |
      (() => {
        const url = location.href;
        const success = !url.includes('/publish/publish');
        return [{ status: success ? 'published' : 'check-browser', detail: url }];
      })()
  - map:
      status: ${{ item.status }}
      detail: ${{ item.detail }}
