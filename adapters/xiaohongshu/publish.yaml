site: xiaohongshu
name: publish
description: 小红书发布图文笔记
domain: creator.xiaohongshu.com
strategy: cookie
browser: true

args:
  content:
    type: string
    default: ""
  title:
    type: string
    default: ""
  images:
    type: string
    default: ""

columns: [status, detail]

pipeline:
  # 1. 打开发布页
  - navigate: https://creator.xiaohongshu.com/publish/publish
  - wait: 3

  # 2. 切换到"上传图文" tab
  - evaluate: |
      (() => {
        const tabs = document.querySelectorAll('.header-tabs .creator-tab');
        const t = Array.from(tabs).find(el => el.textContent.includes('上传图文') && el.getBoundingClientRect().x > 0);
        if (t) t.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
        return true;
      })()
  - wait: 2

  # 3. 上传图片（CDP native DOM.setFileInputFiles）
  - upload:
      selector: "input.upload-input"
      files: "${{ args.images }}"
  - wait: 15

  # 4. 填写标题（CDP native keyboard）
  - type:
      selector: "input.d-text"
      text: "${{ args.title }}"
  - wait: 0.5

  # 5. 填写正文（CDP native keyboard into ProseMirror editor）
  - type:
      selector: ".tiptap.ProseMirror"
      text: "${{ args.content }}"
  - wait: 0.5

  # 6. 点击发布按钮（CDP native click on red publish button）
  - click_selector: ".publish-page-publish-btn button.bg-red"
  - wait: 5

  # 7. 检查结果
  - evaluate: |
      (() => {
        const url = location.href;
        const success = !url.includes('/publish/publish');
        return [{ status: success ? 'published' : 'check-browser', detail: url }];
      })()
  - map:
      status: ${{ item.status }}
      detail: ${{ item.detail }}
