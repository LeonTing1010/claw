site: xiaohongshu
name: search
description: 搜索小红书笔记，返回标题+点赞数+链接
domain: xiaohongshu.com
strategy: cookie
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  keyword:
    type: string
  limit:
    type: int
    default: 20

columns: [title, likes, url, author]

pipeline:
  - navigate: "https://www.xiaohongshu.com/search_result?keyword=${{ args.keyword }}&type=51"
  - wait_for:
      selector: section.note-item
      timeout: "10"
  - wait: 2
  - evaluate: |
      (() => {
        return Array.from(document.querySelectorAll('section.note-item')).map(el => {
          const linkEl = el.querySelector('a');
          const href = linkEl ? linkEl.getAttribute('href') : '';
          const title = el.querySelector('.title span')?.innerText
            || el.querySelector('a.title')?.innerText
            || '';
          const likes = el.querySelector('.like-wrapper .count')?.innerText || '0';
          const author = el.querySelector('.author-wrapper .name')?.innerText
            || el.querySelector('.nickname')?.innerText
            || '';
          return {
            title: title.trim(),
            likes: likes.trim(),
            url: href ? 'https://www.xiaohongshu.com' + href : '',
            author: author.trim()
          };
        }).filter(item => item.title.length > 0);
      })()
  - map:
      title: ${{ item.title }}
      likes: ${{ item.likes }}
      url: ${{ item.url }}
      author: ${{ item.author }}
  - limit: ${{ args.limit }}
