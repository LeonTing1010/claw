site: douyin
name: hot
description: 抖音热搜榜
domain: douyin.com
strategy: cookie
browser: true

args:
  limit:
    type: int
    default: 20

columns: [rank, title, hot]

pipeline:
  - navigate: https://www.douyin.com
  - wait: 3
  - evaluate: |
      (async () => {
        const res = await fetch('https://www.douyin.com/aweme/v1/web/hot/search/list/', { credentials: 'include' });
        const data = await res.json();
        if (data.data && data.data.word_list) {
          return data.data.word_list.map((item, i) => ({
            rank: i + 1,
            title: item.word,
            hot: item.hot_value || 0
          }));
        }
        return [{ rank: 1, title: 'API requires login — visit douyin.com first', hot: 0 }];
      })()
  - map:
      rank: ${{ item.rank }}
      title: ${{ item.title }}
      hot: ${{ item.hot }}
  - limit: ${{ args.limit }}
