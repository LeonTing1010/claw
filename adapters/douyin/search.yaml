site: douyin
name: search
description: 搜索抖音视频，返回标题+点赞数+作者
domain: douyin.com
strategy: cookie
browser: true
version: "1"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  keyword:
    type: string
  limit:
    type: int
    default: 20

columns: [title, likes, author, url]

pipeline:
  - navigate: https://www.douyin.com
  - wait: 3
  - evaluate: |
      (async () => {
        try {
          const keyword = decodeURIComponent("${{ args.keyword }}");
          const res = await fetch(
            'https://www.douyin.com/aweme/v1/web/general/search/single/?'
            + new URLSearchParams({
                search_channel: 'aweme_general',
                keyword: keyword,
                count: '20',
                offset: '0',
                need_filter_settings: '1',
                device_platform: 'webapp',
                aid: '6383'
              }).toString(),
            { credentials: 'include' }
          );
          const data = await res.json();
          if (data.data) {
            return data.data
              .filter(item => item.aweme_info)
              .map((item, i) => {
                const info = item.aweme_info;
                const stats = info.statistics || {};
                return {
                  title: info.desc || '',
                  likes: String(stats.digg_count || 0),
                  author: info.author?.nickname || '',
                  url: 'https://www.douyin.com/video/' + (info.aweme_id || '')
                };
              });
          }
          return [{ title: 'API requires login — visit douyin.com first', likes: '0', author: '', url: '' }];
        } catch(e) {
          return [{ title: 'Error: ' + e.message, likes: '0', author: '', url: '' }];
        }
      })()
  - map:
      title: ${{ item.title }}
      likes: ${{ item.likes }}
      author: ${{ item.author }}
      url: ${{ item.url }}
  - limit: ${{ args.limit }}
