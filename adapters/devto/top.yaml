site: devto
name: top
description: Dev.to 热门文章
domain: dev.to
strategy: public
browser: false
version: "2"
last_forged: "2026-03-28"
forged_by: "claude-opus-4"

args:
  limit:
    type: int
    default: 20

columns: [title, reactions, comments, author]

pipeline:
  - fetch: https://dev.to/api/articles?per_page=50&state=rising
  - map:
      title: ${{ item.title }}
      reactions: ${{ item.positive_reactions_count }}
      comments: ${{ item.comments_count }}
      author: ${{ item.user.name }}
  - limit: ${{ args.limit }}
